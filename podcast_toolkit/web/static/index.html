<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>podcast edit</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1 class="title" id="title">載入中…</h1>
        <div class="status" id="status"></div>
      </div>
      <div class="ep-switch">
        <button id="ep-switch-btn" type="button">📁 開啟集資料夾</button>
        <div class="ep-switch-error" id="ep-switch-error" hidden></div>
      </div>
      <div class="actions">
        <button id="settings-btn" title="設定">⚙</button>
        <button id="assemble-btn">🎬 開始合成</button>
        <button id="cancel-btn">取消</button>
        <button id="save-btn" class="primary" disabled>完成並儲存</button>
      </div>
    </header>

    <main class="body">
      <section class="video-pane">
        <div class="version-tabs" id="version-tabs">
          <button class="version-tab active" data-version="yt" type="button">
            YT 16:9 完整版
          </button>
          <button class="version-tab" data-version="reels" type="button">
            Reels 9:16 短版
          </button>
        </div>
        <div class="video-wrap">
          <video id="video" src="/api/video" preload="metadata"></video>
          <div id="caption-overlay"></div>
          <div class="crop-frame" id="crop-frame">
            <div class="handle tl" data-edge="tl"></div>
            <div class="handle tr" data-edge="tr"></div>
            <div class="handle bl" data-edge="bl"></div>
            <div class="handle br" data-edge="br"></div>
          </div>
        </div>
        <div class="controls">
          <button id="play-btn">▶</button>
          <span id="time">00:00 / 00:00</span>
          <input type="range" id="seek" min="0" max="100" value="0" />
        </div>
        <div class="crop-info">
          <span id="crop-text">裁切框：未設定</span>
          <div class="crop-ratios">
            <button class="ratio-btn" data-ratio="4:5">4:5</button>
            <button class="ratio-btn" data-ratio="9:16">9:16</button>
            <button class="ratio-btn" data-ratio="16:9">16:9</button>
            <button id="crop-reset">↺ 重設</button>
          </div>
        </div>

        <div class="files-pane">
          <h2 class="typo-head">
            <span>專案檔案</span>
            <span class="typo-sub" id="files-summary">載入中…</span>
          </h2>
          <div id="files-list" class="files-list"></div>
        </div>

        <div class="typo-pane">
          <div class="typo-section">
            <h2 class="typo-head">
              <span>全域字典</span>
              <span class="typo-sub" id="typo-dict-summary">載入中…</span>
            </h2>
            <div id="typo-dict-list" class="typo-list"></div>
          </div>
          <div class="typo-section">
            <h2 class="typo-head">
              <span>本集修改</span>
              <span class="typo-sub" id="typo-overrides-summary">0 處</span>
            </h2>
            <div id="typo-overrides-list" class="typo-list"></div>
          </div>
        </div>
      </section>

      <section class="cards-pane">
        <div id="cards-list"></div>
      </section>
    </main>

    <!-- 設定 modal -->
    <div class="modal-backdrop hidden" id="settings-modal">
      <div class="modal">
        <div class="modal-head">設定</div>
        <div class="modal-body">
          <label class="modal-label">xAI API key</label>
          <div class="modal-row">
            <input
              type="password"
              id="settings-xai-key"
              placeholder="xai-..."
              autocomplete="off"
            />
            <button id="settings-show" type="button" title="顯示/隱藏">
              👁
            </button>
          </div>
          <div class="modal-hint" id="settings-status">尚未設定</div>
          <div class="modal-hint">
            從 <a href="https://console.x.ai" target="_blank">console.x.ai</a>
            取得，存於 ~/.podcast-toolkit/config.json
          </div>
        </div>
        <div class="modal-actions">
          <button id="settings-cancel">取消</button>
          <button id="settings-save" class="primary">儲存</button>
        </div>
      </div>
    </div>

    <!-- 建立集架構 modal -->
    <div class="modal-backdrop hidden" id="init-modal">
      <div class="modal">
        <div class="modal-head">這個資料夾還沒有 episode.yaml</div>
        <div class="modal-body">
          <div class="init-block">
            <div class="init-label">資料夾</div>
            <div class="init-value" id="init-folder-path"></div>
          </div>
          <div class="init-block" id="init-warn-block" hidden>
            <div class="init-warn" id="init-warn"></div>
          </div>
          <div class="init-cols">
            <div class="init-col">
              <div class="init-label">現有內容</div>
              <div class="init-list" id="init-current-list"></div>
            </div>
            <div class="init-col">
              <div class="init-label">將會建立</div>
              <div class="init-list" id="init-create-list"></div>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="init-cancel">取消</button>
          <button id="init-go" class="primary">建立並切集</button>
        </div>
      </div>
    </div>

    <!-- 合成進度 modal -->
    <div class="modal-backdrop hidden" id="assemble-modal">
      <div class="modal">
        <div class="modal-head" id="assemble-title">準備合成</div>
        <div class="modal-body">
          <div id="assemble-select">
            <p class="modal-hint">選擇要合成的版本：</p>
            <label class="checkbox-row">
              <input type="checkbox" id="assemble-yt" checked />
              <span>YT 16:9 完整版（含片頭片尾）</span>
            </label>
            <label class="checkbox-row">
              <input type="checkbox" id="assemble-reels" />
              <span>Reels 9:16 短版（無片頭片尾）</span>
            </label>
            <label class="checkbox-row">
              <input type="checkbox" id="assemble-force" />
              <span>覆寫既有檔案（--force）</span>
            </label>
          </div>
          <div id="assemble-progress" class="hidden">
            <div class="progress-line">
              <span id="assemble-current-label">準備中…</span>
              <span id="assemble-eta-label">—</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="assemble-fill"></div>
            </div>
            <div class="progress-meta">
              <span id="assemble-percent">0%</span>
              <span id="assemble-eta">—</span>
            </div>
            <div id="assemble-msg" class="modal-hint">…</div>
          </div>
        </div>
        <div class="modal-actions" id="assemble-actions">
          <button id="assemble-cancel">取消</button>
          <button id="assemble-confirm" class="primary">開始合成</button>
          <button id="assemble-reveal" class="primary" hidden>
            📁 在 Finder 開啟
          </button>
        </div>
      </div>
    </div>

    <!-- 轉字幕進度 modal -->
    <div class="modal-backdrop hidden" id="transcribe-modal">
      <div class="modal">
        <div class="modal-head" id="transcribe-title">準備轉字幕</div>
        <div class="modal-body">
          <div id="transcribe-msg">…</div>
        </div>
        <div class="modal-actions" id="transcribe-actions">
          <button id="transcribe-cancel">取消</button>
          <button id="transcribe-go" class="primary">開始</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
