<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>podcast edit</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="title" id="title">載入中…</div>
        <div class="status" id="status"></div>
      </div>
      <div class="actions">
        <button id="cancel-btn">取消</button>
        <button id="save-btn" class="primary" disabled>完成並儲存</button>
      </div>
    </header>

    <main class="body">
      <section class="video-pane">
        <div class="video-wrap">
          <video id="video" src="/api/video" preload="metadata"></video>
          <div id="caption-overlay"></div>
          <div class="crop-frame" id="crop-frame">
            <div class="handle tl" data-edge="tl"></div>
            <div class="handle tr" data-edge="tr"></div>
            <div class="handle bl" data-edge="bl"></div>
            <div class="handle br" data-edge="br"></div>
          </div>
        </div>
        <div class="controls">
          <button id="play-btn">▶</button>
          <span id="time">00:00 / 00:00</span>
          <input type="range" id="seek" min="0" max="100" value="0" />
        </div>
        <div class="crop-info">
          <span id="crop-text">裁切框：未設定</span>
          <button id="crop-reset">↺ 重設為整張</button>
        </div>

        <div class="typo-pane">
          <div class="typo-section">
            <div class="typo-head">
              <span>全域字典</span>
              <span class="typo-sub" id="typo-dict-summary">載入中…</span>
            </div>
            <div id="typo-dict-list" class="typo-list"></div>
          </div>
          <div class="typo-section">
            <div class="typo-head">
              <span>本集修改</span>
              <span class="typo-sub" id="typo-overrides-summary">0 處</span>
            </div>
            <div id="typo-overrides-list" class="typo-list"></div>
          </div>
        </div>
      </section>

      <section class="cards-pane">
        <div id="cards-list"></div>
      </section>
    </main>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
