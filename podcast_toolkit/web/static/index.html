<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>podcast edit</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="title" id="title">載入中…</div>
        <div class="status" id="status"></div>
      </div>
      <div class="actions">
        <button id="settings-btn" title="設定">⚙</button>
        <button id="cancel-btn">取消</button>
        <button id="save-btn" class="primary" disabled>完成並儲存</button>
      </div>
    </header>

    <main class="body">
      <section class="video-pane">
        <div class="video-wrap">
          <video id="video" src="/api/video" preload="metadata"></video>
          <div id="caption-overlay"></div>
          <div class="crop-frame" id="crop-frame">
            <div class="handle tl" data-edge="tl"></div>
            <div class="handle tr" data-edge="tr"></div>
            <div class="handle bl" data-edge="bl"></div>
            <div class="handle br" data-edge="br"></div>
          </div>
        </div>
        <div class="controls">
          <button id="play-btn">▶</button>
          <span id="time">00:00 / 00:00</span>
          <input type="range" id="seek" min="0" max="100" value="0" />
        </div>
        <div class="crop-info">
          <span id="crop-text">裁切框：未設定</span>
          <div class="crop-ratios">
            <button class="ratio-btn" data-ratio="4:5">4:5</button>
            <button class="ratio-btn" data-ratio="9:16">9:16</button>
            <button class="ratio-btn" data-ratio="16:9">16:9</button>
            <button id="crop-reset">↺ 重設</button>
          </div>
        </div>

        <div class="files-pane">
          <div class="typo-head">
            <span>專案檔案</span>
            <span class="typo-sub" id="files-summary">載入中…</span>
          </div>
          <div id="files-list" class="files-list"></div>
        </div>

        <div class="typo-pane">
          <div class="typo-section">
            <div class="typo-head">
              <span>全域字典</span>
              <span class="typo-sub" id="typo-dict-summary">載入中…</span>
            </div>
            <div id="typo-dict-list" class="typo-list"></div>
          </div>
          <div class="typo-section">
            <div class="typo-head">
              <span>本集修改</span>
              <span class="typo-sub" id="typo-overrides-summary">0 處</span>
            </div>
            <div id="typo-overrides-list" class="typo-list"></div>
          </div>
        </div>
      </section>

      <section class="cards-pane">
        <div id="cards-list"></div>
      </section>
    </main>

    <!-- 設定 modal -->
    <div class="modal-backdrop hidden" id="settings-modal">
      <div class="modal">
        <div class="modal-head">設定</div>
        <div class="modal-body">
          <label class="modal-label">xAI API key</label>
          <div class="modal-row">
            <input
              type="password"
              id="settings-xai-key"
              placeholder="xai-..."
              autocomplete="off"
            />
            <button id="settings-show" type="button" title="顯示/隱藏">
              👁
            </button>
          </div>
          <div class="modal-hint" id="settings-status">尚未設定</div>
          <div class="modal-hint">
            從 <a href="https://console.x.ai" target="_blank">console.x.ai</a>
            取得，存於 ~/.podcast-toolkit/config.json
          </div>
        </div>
        <div class="modal-actions">
          <button id="settings-cancel">取消</button>
          <button id="settings-save" class="primary">儲存</button>
        </div>
      </div>
    </div>

    <!-- 轉字幕進度 modal -->
    <div class="modal-backdrop hidden" id="transcribe-modal">
      <div class="modal">
        <div class="modal-head" id="transcribe-title">準備轉字幕</div>
        <div class="modal-body">
          <div id="transcribe-msg">…</div>
        </div>
        <div class="modal-actions" id="transcribe-actions">
          <button id="transcribe-cancel">取消</button>
          <button id="transcribe-go" class="primary">開始</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
