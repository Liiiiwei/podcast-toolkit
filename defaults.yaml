resegment:
  maxlen: 17
  hardlen: 23
  gapmax: 0.6
  qend_chars: "嗎呢"
  dangle_endings: ["因為", "所以", "但是", "可是", "然後", "而且",
                   "或是", "還是", "而是", "就是", "就"]
  reaction_words: ["對", "對啊", "對對", "對對對", "嗯", "嗯嗯嗯",
                   "哈哈哈", "哈哈", "哇", "喔", "哦", "蛤", "對啦",
                   "好", "是吧", "是喔"]
  use_filler_filter: false
  flag_half_sentence: false  # 「半句結尾」黃卡旗標：任何結尾是 就/的/然後 的正常句都會中，
                             # 誤判率高，預設關。true 才把半句結尾標成待複查（重複幻覺一律照標）。
  straddle_gap: 0.35    # check-seg ④ 跨卡切詞：相鄰卡間隔 ≤ N 秒才檢（更大＝真氣口，不算）
  jieba_dict: null      # jieba 詞典路徑；null＝自動偵測（Breeze dict.txt.big 存在就用，否則內建）
  whisper_guard:
    char_loop_min_repeats: 4

# reflow（subtitle_cleanup 依 proofread 空格重切）可調參數。預設＝既有硬寫死行為，
# 不填整段時所有集位元組不變；個別集在 episode.yaml 覆寫。
reflow:
  gap: 0.3            # 同講者、間隔 < 此值 → 同一 run 一起重切（放大＝更少被換氣打斷）
  max_w: 16          # 單一語句 > 此值才交 word_break 評分切
  merge_short: true  # 全域啟用：保守回退用「加強併接」把過碎短卡貪婪併到 ≤merge_target
                     #（治 Breeze 逐字殘留：『還好／一點』併成『還好一點』）。false＝只併單字碎卡
  merge_target: 9    # merge_short 的併接上限字數（人手實測中位數 ≈9，避免併過頭跨子句）

# 編輯介面「可疑空拍卡」門檻。分兩級：reaction_only（純語助詞）標紅、可批次刪；
# short_long / big_gap 誤判率高，只標淡灰資訊、不進批次刪。reaction_words 沿用 resegment。
suspicious_pause:
  short_long_max_chars: 3      # 文字 < N 字
  short_long_min_dur_sec: 2.0  # 但持續 > N 秒 → 短句拖很久
  big_gap_min_sec: 1.5         # 距離前一張卡 > N 秒 → 前面有大靜默

# 跨集確定性 1:1 盲替換（resegment 時 s.replace 套用）。只放「不看語境也不會誤傷」的。
# 用字偏好（蠻→滿）、代名詞（他→牠/她）、數字國字化（4→四）刻意「不」放這裡——
# 那些要看語境，盲替換會誤傷（野蠻→野滿、2024→二〇二四），改由 proofread 處理。
common_fixes:
  - ["賬", "帳"]   # 異體字殘留；OpenCC s2twp 不會處理，三集都出現

# 分軌轉錄設定（per-mic transcribe 用）
# 每路 mic 先過 VAD 閘掉串音（RMS < threshold 視為靜音餵給 Gemini），
# Gemini 就不會幫你「轉錄別人講的話」。三路 SRT merge 時自帶 speaker label。
per_mic:
  vad_threshold: 0.02         # RMS 門檻；< threshold 的 frame 壓成靜音
  vad_min_speech_sec: 0.3     # 連續說話最短時長（過濾爆音 / 咳嗽 / 桌面碰撞）
  vad_pad_sec: 0.15           # 說話段前後保留 pad，避免切掉氣口

# Gemini 轉字幕設定（podcast subtitle 用）
gemini:
  model: "gemini-2.5-flash"
  # 字幕格式規則（會注入 prompt）
  max_chars_per_line: 17
  min_chars_per_card: 8          # 切句下限；除純反應詞外，1 ~ N-1 字的短卡要求 Gemini 合併
  max_lines_per_card: 1
  punctuation: "none"            # none | half_width | full_width；none 同時開啟後處理移除殘留標點
  allow_ellipsis: false
  # 自訂規則（list of str，每行一條，會逐條附在 prompt 末段）
  extra_rules: []

# 通用詞庫（所有集共用，會與 episode.yaml 的 glossary 合併）
# 格式：
#   - canonical: "正確寫法"
#     sounds_like: ["可能誤聽 1", "可能誤聽 2"]   # 可省略
#     note: "說明"                                  # 可省略
# 也可直接寫純字串：- "Liwei Sia"
# 節目固定詞（節目名/主持人）：誤聽形式雜亂（孫美洲羅愛上班/阿文軒/莫老闆月球…），故只放 canonical、
# 不做 sounds_like 硬替換——靠每集 ingest-breeze 後自動跑的本地 claude proofread 讀進 prompt、靠語境改。
common_glossary:
  - canonical: "我愛上班"
    note: "節目名；ASR 常聽錯成『孫美洲羅愛上班』等"
  - canonical: "郝慧川"
    note: "主持人；ASR 常聽錯成『阿文軒』等"
  - canonical: "岳啟儒"
    note: "主持人本名；ASR 常聽錯（月球/啟儒…）"
  - canonical: "惡魔老闆"
    note: "岳啟儒的稱號；ASR 常聽錯成『莫老闆』等"

subtitle_style:
  font_name: "Hiragino Sans GB"
  font_size: 48
  bold: 1
  primary_colour: "&H00FFFFFF"
  outline_colour: "&H00000000"
  border_style: 1
  outline: 2
  shadow: 1
  margin_v: 100

# Reels 9:16 專用字幕風格（手機豎屏 + IG/TikTok 底部動作列遮擋）
# 缺欄位時自動回退到上面的 subtitle_style；episode.yaml 可整段覆寫
# alignment: SSA v3（ffmpeg subtitles filter 內部用 v3 編碼）
#   2=底部置中、6=頂部置中、10=畫面正中央
#   ⚠️ 不是 ASS v4+ numpad — 5 在 v3 是「左上角」會把字推到角落
subtitle_style_reels:
  font_name: "Hiragino Sans GB"
  font_size: 96               # 比 YT +100%，手機小螢幕看得清（user requested 更大）
  bold: 1
  primary_colour: "&H00FFFFFF"
  outline_colour: "&H00000000"
  border_style: 1
  outline: 3                  # 描邊 +1px，避免在動態畫面糊掉
  shadow: 1
  alignment: 10               # SSA v3 mid-center（畫面正中央）
  margin_v: 480               # alignment=10 時 MarginV 正值=從中心向下偏移；480/1920 = 25%（中心向下 25%，落在 75% 線、避開臉部、留下方動作列空間）

# 節目封面 / 浮水印（assemble 階段 ffmpeg overlay 燒上去）
# 只疊在「正片段」，片頭片尾不放 → 天生符合「錄影開始後才放封面」。
# enabled=false 時整段 no-op；每集可在編輯介面勾選開關（寫進 episode.yaml watermark.enabled）。
# 取圖優先 assets.cover（節目封面），退回 assets.logo。
# 座標都是相對最終輸出 frame（crop+scale 後的 1920×1080 / 1080×1920）
watermark:
  enabled: true                # 預設每集都放節目封面；個別集可在編輯介面取消
  position: "top-right"        # top-right | top-left | bottom-right | bottom-left
  width_pct: 0.11              # 封面寬佔 frame 寬比例（1920 → ~211px 小徽章）
  margin_top_pct: 0.03         # 距上/下邊距比例
  margin_right_pct: 0.03       # 距右/左邊距比例
  opacity: 1.0                 # 0.0-1.0，先預留欄位（目前 overlay 直接用原 alpha）

# 正片倍速（只加速正片，片頭/片尾維持原速）。每集可在編輯介面開關 + 調倍率。
# 燒字幕模式：字幕先燒進畫面再 setpts → 自動同步；sidecar 模式：另存的 .srt 同步 ÷ 倍率。
# factor 夾在 atempo 合法區間 0.5–2.0。
speed:
  enabled: false
  factor: 1.25

# 全片去空拍（偵測中段靜音→跳剪掉）。合成設定視窗可開關。預設關。
# min_silence：停頓 >= 幾秒才剪（避免砍掉氣口/自然停頓）。
# pad：每段靜音內縮幾秒留緩衝，不貼死語音（避免剪掉語音起音）。
# noise_db：低於此音量（dB）算靜音；越接近 0 越嚴格（剪越少）。
silence_trim:
  enabled: false
  min_silence: 0.8
  pad: 0.15
  noise_db: -30

# 畫面拉正旋轉（補拍攝傾斜）。per cam 各自一個角度（度數，順時針為正），YT / Reels 共用。
# 旋轉露出的黑角靠 crop 內縮裁掉（建議搭配 crop 使用）。
rotate:
  a: 0
  b: 0

# 鏡頭自動建議規則（podcast suggest-cameras 用，分軌集才有 speakers）。
# 剪法：預設待在 home 鏡頭（wide/主持）；feature 裡的講者連續講滿 min_sec 秒，才把那整段
# 切到他的鏡頭，講完回 home；其他講者一律留 home。沈奕妤集實測逐卡吻合 99%。
# feature 是 speaker_key→cam（speaker_key 對齊 mics 的 key；來賓通常在最後一軌）。
# 不同集若來賓在別軌/別台，於 episode.yaml 覆寫 camera_rule。
camera_rule:
  home: a
  feature:
    c: b
  min_sec: 15

# 刪段邊界往前後各「最多」吃掉 cut_pad 秒的邊緣雜音（換氣/吸氣/底噪），夾在鄰卡語音邊界內、
# 不咬保留語音；某側沒有鄰卡（片頭/片尾）則不外吃（那是 head/tail trim 的事）。
# 每側殘留 = 該側間隙 − min(該側間隙, cut_pad)（左右各自獨立 cap）：某側間隙大於 pad 留自然停頓
# （不壓平），小於就整段吃掉。逐卡刪只砍語音、雜音留在間隙 → 這個把邊緣那段收乾淨、又保住節奏。
# 預設 0.15（秒）＝每側收 0.15s 雜音、保留自然停頓（這集自然停頓中位數 0.27s，刀口會隱形不趕）。
# 想更乾淨 → 調大（如 0.25）；嫌趕 → 調小；完全不吃只砍語音 → 0；吃滿貼死（會趕）→ 設很大（如 3600）。
cut_pad: 0.15

assets:
  intro: "assets/intro.mp4"
  intro_duration: 7.040375
  intro_fade_out: 0.5
  outro_audio: "assets/outro.mp3"
  outro_image: "assets/subscribe_card.png"
  outro_duration: 20.453333
  # 節目封面檔（右上角小徽章，建議方形 PNG）；watermark.enabled=true 時燒上去
  cover: "assets/cover.png"
  # 浮水印 logo 檔（PNG 建議透明背景）；cover 不存在時的退路；不存在時 watermark 段會被跳過
  logo: "assets/logo.png"

encode:
  # h264_videotoolbox = Apple Silicon 硬體編碼。實測（M3、37 分雙機集、燒字幕）：
  # libx264 medium 57 分 vs videotoolbox 10.7 分（5.4×），SSIM 0.995 肉眼無差。
  # vt 的碼率控制較鬆（33M 目標實得 ~26 Mbps），仍遠超 YouTube 1080p 建議值。
  # 換非 Apple 機器跑時改回 "libx264"（preset 只對 libx264 生效，vt 會自動略過）。
  video_codec: "h264_videotoolbox"
  # hwaccel: 影片輸入用硬體解碼（兩路 4K 母帶收益最大）；libx264 fallback 時可拿掉
  hwaccel: "videotoolbox"
  # VBR 比 CRF 18 給的 ~3.75 Mbps 高一個量級；對齊 DJI 母帶常見 32-35 Mbps
  # 不走 CRF 是因為 CRF 對對話畫面（動態少）會省到剩 3-4 Mbps，肉眼比母帶軟
  # maxrate / bufsize 給 1.2× / 1.8× 的緩衝，讓快速場景可短暫衝高不爆炸
  # preset slow：同碼率畫質保留更好，編碼時間約 medium 的 1.8-2×（僅 libx264 用）
  video_bitrate: "33M"
  video_maxrate: "40M"
  video_bufsize: "60M"
  preset: "slow"
  pix_fmt: "yuv420p"
  audio_codec: "aac"
  audio_bitrate: "192k"
  audio_sample_rate: 48000
  resolution: "1920x1080"
  framerate: "30000/1001"

# 字幕語意校對引擎(podcast proofread / 未來的一鍵自動)
proofread:
  # auto = 本地 Claude Code 優先,其次 Gemini key,都沒有就跳過(非 CC 使用者零影響)
  # 也可硬指定:claude_code | gemini | off
  provider: "auto"
  chunk_size: 60         # 每次餵幾張卡給模型。150 實測會逾時：過嗨乳牛集 8 塊有 3 塊
                         # claude -p 跑不完→靜默丟掉 37% 的卡。降到 60 後 0 逾時，
                         # 自動補上的 CER 差距從 15%（半殘）翻倍到 30%（完整）。
  max_workers: 4         # 並行幾塊(每塊在等模型回應,並行壓掉牆鐘時間;遇 rate limit 可調小)
  timeout_sec: 600       # 每塊逾時:大塊在並行負載下可能較慢,給寬一點(claude -p 本地呼叫)
  model: null            # null = 用 provider 預設(CC 預設模型);bulk 校對建議用 sonnet 更快
  context: ""            # 可選:節目/來賓背景,提升校對準確度(會放進 prompt)
